  # Income
  - name: Google Equity
    group: Income
    is_income: true
  - name: Bonus
    group: Income
    is_income: true
  - name: Reimbursements
    group: Income

  # Spending categories
  - name: Eating out
    group: Food & Dining
  - name: Power/Gas
    group: Utilities
  - name: Internet
