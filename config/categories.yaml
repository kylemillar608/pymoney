    hide_from_budget: true
  - name: Transfer to Checking
    group: Transfers
    is_transfer: true
    hide_from_budget: true
  - name: Transfer from Checking
    group: Transfers
    is_transfer: true
    hide_from_budget: true
  - name: Transfer to Brokerage
    group: Transfers
    is_transfer: true
    hide_from_budget: true
  - name: Transfer from Brokerage
    group: Transfers
    is_transfer: true
    hide_from_budget: true
  - name: Transfer from Temp Equity
    group: Transfers
    is_transfer: true
    hide_from_budget: true
  - name: Brokerage Inv
    group: Investments
    is_transfer: true
    hide_from_budget: true
  - name: Brokerage Transactions
