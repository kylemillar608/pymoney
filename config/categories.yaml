  - name: Subscriptions
    group: Entertainment
  - name: House
    group: Home
  - name: "Renter's Insurance"
    group: Home
  - name: Pet Insurance
    group: Pets
  - name: Hygiene
    group: Personal Care
  - name: Gifts
