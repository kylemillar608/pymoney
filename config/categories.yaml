    group: Transfers
    is_transfer: true
    hide_from_budget: true
  - name: General Savings
    group: Transfers
    is_transfer: true
    hide_from_budget: true
  - name: Transfer to Savings
    group: Transfers
    is_transfer: true
    hide_from_budget: true
