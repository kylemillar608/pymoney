categories:

  # ── Transfers & investments (excluded from cash flow reports) ────────────────

  - name: CC Payment
    group: Transfers
    is_transfer: true
    hide_from_budget: true
    rules:
      - contains: "Chase Credit Crd Autopay"
      - contains: "Automatic Payment - Thank"

  - name: General Savings
    group: Transfers
    is_transfer: true
    hide_from_budget: true
    rules:
      - contains: "Ally Bank $transfer"

  - name: Transfer to Savings
    group: Transfers
    is_transfer: true
    hide_from_budget: true
    rules:
      - all_of:
          - contains: "Requested transfer from Kyle Millar Ally Bank Transfer"
          - account: "Savings Account"

  - name: Transfer from Savings
    group: Transfers
    is_transfer: true
    hide_from_budget: true
    rules:
      - contains: "Requested transfer to Kyle Millar (umb, Na Saving x5403)"

  - name: Transfer to Checking
    group: Transfers
    is_transfer: true
    hide_from_budget: true
    rules:
      - all_of:
          - contains: "Funds Transfer"
          - account: "Checking"

  - name: Transfer from Checking
    group: Transfers
    is_transfer: true
    hide_from_budget: true
    rules:
      - all_of:
          - contains: "Electronic Withdrawal"
          - account: "Checking"

  - name: Transfer to Brokerage
    group: Transfers
    is_transfer: true
    hide_from_budget: true

  - name: Transfer from Brokerage
    group: Transfers
    is_transfer: true
    hide_from_budget: true
    rules:
      - contains: "Funds Transfer from Brokerage -5142"

  - name: Transfer from Temp Equity
    group: Transfers
    is_transfer: true
    hide_from_budget: true
    rules:
      - all_of:
          - contains: "Transfer Funds"
          - account: "Temp Equity"

  - name: Brokerage Inv
    group: Investments
    is_transfer: true
    hide_from_budget: true
    rules:
      - all_of:
          - contains: "You Bought"
          - account: "Brokerage"

  - name: Brokerage Transactions
    group: Investments
    is_transfer: true
    hide_from_budget: true
    rules:
      - contains: "Purchase Into Core Account Fidelity Government Money Market"
      - contains: "Redemption From Core Account Fidelity Government Money Market"

  - name: 401k Transactions
    group: Investments
    is_transfer: true
    hide_from_budget: true
    rules:
      - account: "401k"

  - name: Roth Transactions
    group: Investments
    is_transfer: true
    hide_from_budget: true
    rules:
      - account: "Roth IRA"

  - name: Equity Awards Transactions
    group: Investments
    is_transfer: true
    hide_from_budget: true
    rules:
      - account: "Equity Awards"

  - name: Temp Equity Transactions
    group: Investments
    is_transfer: true
    hide_from_budget: true
    rules:
      - account: "Temp Equity"

  - name: Crypto Inv
    group: Investments
    is_transfer: true
    hide_from_budget: true
    rules:
      - contains: "Coinbase"

  # ── Income ───────────────────────────────────────────────────────────────────

  - name: Investments
    group: Other Income
    is_income: true
    rules:
      - all_of:
          - contains: "Interest Paid"
          - account: "Checking"
      - all_of:
          - contains: "Interest Paid"
          - account: "Savings Account"
      - all_of:
          - contains: "Dividend Received"
          - account: "Brokerage"
      - all_of:
          - contains: "Reinvestment"
          - account: "Brokerage"

  - name: Google Equity
    group: Primary Income
    is_income: true
    rules:
      - all_of:
          - contains: "Alphabet Inc Class Class C"
          - account: "Temp Equity"

  - name: Bonus
    group: Primary Income
    is_income: true

  - name: Reimbursements
    group: Other Income
    is_income: true
    rules:
      - contains: "Atm Fee Rebate"

  - name: Paycheck
    group: Primary Income
    is_income: true
    rules:
      - contains: "Google Llc Payroll"

  # ── Spending categories ───────────────────────────────────────────────────────

  - name: Rent
    group: Home
    rules:
      - contains: "Com Ref Williams Web Pmts"
      - contains: "Wf Credit Card Auto Pay"
      - contains: "Zelle From Jennifer Tulka"

  - name: Groceries
